services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentchat}
      POSTGRES_USER: ${POSTGRES_USER:-agentchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentchat_dev_pw}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentchat} -d ${POSTGRES_DB:-agentchat}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://agentchat:agentchat_dev_pw@postgres:5432/agentchat
      REDIS_URL: redis://redis:6379/0
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-change_me_base64_32bytes}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\""]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    volumes:
      - ./frontend/public/workflow-console.html:/app/dist/workflow-console.html:ro
    depends_on:
      - backend

  nginx:
    build: ./nginx
    environment:
      AGENTCHAT_BASIC_AUTH_USER: ${AGENTCHAT_BASIC_AUTH_USER:?set_in_env}
      AGENTCHAT_BASIC_AUTH_PASS: ${AGENTCHAT_BASIC_AUTH_PASS:?set_in_env}
      AGENTCHAT_TLS_DOMAIN: ${AGENTCHAT_TLS_DOMAIN:-sybae.duckdns.org}
    volumes:
      - ./nginx/certs:/etc/nginx/certs
    ports:
      - "50004:443"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
